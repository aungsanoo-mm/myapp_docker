global:
  scrape_interval: 15s # ၁၅ စက္ကန့်တစ်ခါ အချက်အလက်ယူမယ်

scrape_configs:
  - job_name: 'flask-app'
    static_configs:
      - targets: ['app:5000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'docker-containers'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'linux-os' #Linux OS system monitoring
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: 'windows-os'
    static_configs:
      - targets: ['10.1.9.189:9182'] # Windows စက်၏ IP နှင့် Port 9182